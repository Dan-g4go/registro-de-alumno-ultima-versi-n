<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <nav>
        <a href="index.html" style="text-decoration: none;"><i class="bi bi-arrow-left"></i>Volver a ofertas</a>
    </nav>

    <main>

        <h1>📝Ficha de postulación</h1>

        <p>Puesto: <strong>Frontend Developer Trainee</strong></p>

    </main>
    <hr>
   <fieldset>
    <legend>Datos Personales</legend>
    <label>Nombres Completos:</label><br>
    <input type="text" placeholder="Tu nombre aquí" style="width: 100%; padding: 5px; margin-bottom: 15px; box-sizing: border-box;"><br><br>

    <label>Correo Electronico:</label><br>
    <input type="text" placeholder="ejemplo@gmail.com" style="width: 100%; padding: 5px; margin-bottom: 15px; box-sizing: border-box;"><br><br>

    <label>Teléfono:</label><br>
    <input type="text" placeholder="+51 999 999 999" style="width: 100%; padding: 5px; margin-bottom: 15px; box-sizing: border-box;"><br><br>
   </fieldset><br>

   <fieldset>
    <legend>Perfil Tecnico</legend>
    <label>Link de GitHub</label>
    <input type="url" placeholder="https://github.com/usuario" style="width: 100%; padding: 5px; margin-bottom: 15px; box-sizing: border-box;"><br><br>

    <label>Nivel de Ingles:</label><br>
    <select style="width: 100%; padding: 5px; margin-bottom: 15px; box-sizing: border-box;"><br>
        <option value="#">Basico</option>
        <option value="#">Intermedio</option>
        <option value="#">Avanzado</option>
    </select>
    <br><br><br>
   </fieldset>
   
   
</body>

</html>
